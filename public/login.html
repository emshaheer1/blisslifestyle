<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Bliss Lifestyle Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <img src="/logo.png" alt="Bliss Lifestyle" class="login-logo" />
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Sign in to manage registrations</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="username"><i class="fa-regular fa-user"></i> Username</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              required
              placeholder="Enter your username"
            />
          </div>
          <div class="form-group">
            <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
              placeholder="Enter your password"
            />
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>
        </form>
        <p class="error-msg" id="errorMsg"></p>
      </div>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
